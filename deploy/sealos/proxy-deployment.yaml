apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-proxy
  namespace: ns-0ffzk4u2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claude-proxy
  template:
    metadata:
      labels:
        app: claude-proxy
    spec:
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: claude-proxy
          image: node:20-alpine
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - tar -xzf /app-src/app.tgz -C /work && cd /work && npm ci --omit=dev && node index.js
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
          ports:
            - containerPort: 3985
              name: http
          env:
            - name: PORT
              value: "3985"
            - name: DATABASE_URL
              value: postgresql://postgres:sxkpf2sh@chat-server-postgresql.ns-0ffzk4u2.svc.cluster.local:5432/
            - name: CLAUDE_UPSTREAM_BASE_URL
              value: https://claude.ai
            - name: SEARXNG_URL
              value: https://searxng-ns-0ffzk4u2.usw-1.sealos.app
            - name: SESSION_CACHE_TTL_MS
              value: "300000"
            - name: REQUEST_TIMEOUT_MS
              value: "120000"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: app-code
              mountPath: /app-src
              readOnly: true
            - name: app-work
              mountPath: /work
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: app-code
          configMap:
            name: claude-proxy-code
        - name: app-work
          emptyDir: {}
